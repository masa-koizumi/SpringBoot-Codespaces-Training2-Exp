<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード設定</title>
    <style>
        .container { padding: 20px; }
        .alert-success { color: green; }
        .alert-danger { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h2>パスワード設定</h2>
        <p>ユーザを選択し、新しいパスワードを設定してください。</p>
        
        <form th:action="@{/user/setup-password}" method="post">
            <div>
                <label>ユーザー名：</label>
                <select name="userId" required>
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
                </select>
            </div>
            <br>
            <div>
                <label>新しいパスワード：</label>
                <input type="password" name="password" required>
            </div>
            <br>
            <button type="submit">保存する</button>
        </form>

        <hr>
        <div th:if="${message}" class="alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>
        <br>

        <a th:href="@{/menu}">← メニューへ戻る</a>
       
    </div>
</body>
</html>
