<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規資産登録</title>
</head>
<body>
    <h2>新規資産の登録</h2>
    
    <form th:action="@{/assets/new}" method="post">
        <div>
            <label>資産名：</label>
            <input type="text" name="name" required placeholder="PC、モニターなど">
        </div>
        <br>
        <button type="submit">登録する</button>
        <a th:href="@{/menu}">キャンセル</a>
    </form>
</body>
</html>
