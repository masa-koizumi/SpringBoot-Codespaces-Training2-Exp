<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>資産一覧 | 備品管理システム</title>
    <style>
        .overdue { color: red; font-weight: bold; } /* 期限切れ用スタイル */
        .available { color: green; }               /* 利用可能用スタイル */
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <h2>資産一覧</h2>
    <a th:href="@{/menu}">← メニューへ戻る</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>資産名</th>
                <th>状態</th>
                <th>借用者</th>
                <th>返却期限</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${assets}">
                <td th:text="${a.id}">1</td>
                <td th:text="${a.name}">ノートPC</td>
                
                <td>
                    <span th:text="${a.status == 'LOANED' ? '貸出中' : '利用可能'}"
                          th:class="${a.status == 'LOANED' ? 'overdue' : 'available'}">
                    </span>
                </td>

                <td>
                    <span th:if="${a.status == 'LOANED'}" th:text="${a.loanUserName}">田中</span>
                    <span th:if="${a.status != 'LOANED'}">-</span>
                </td>

                <td>
                    <div th:if="${a.status == 'LOANED' && a.returnDeadline != null}">
                        <span th:text="${a.returnDeadline}"
                            th:style="${a.returnDeadline.isBefore(T(java.time.LocalDate).now()) ? 'color: red; font-weight: bold;' : ''}">
                        </span>
                        
                        <small th:style="${a.assetReturnDeadline != null && a.assetReturnDeadline.isBefore(T(java.time.LocalDate).now()) ? 'color: red; font-weight: bold;' : ''}"
                                th:style="'display:block; font-size: 0.8em; color: red; font-weight: bold;'">
                            ※期限を過ぎています！
                        </small>
                    </div>
                    <span th:if="${a.status != 'LOANED'}">-</span>
                </td>
            </tr>
        </tbody>
    </table>

    <hr>
    <h3>新しい資産を登録する</h3>
    <form th:action="@{/assets}" method="post">
        名前: <input type="text" name="name" required placeholder="例: モニター">
        <button type="submit">登録</button>
    </form>

</body>
</html>
