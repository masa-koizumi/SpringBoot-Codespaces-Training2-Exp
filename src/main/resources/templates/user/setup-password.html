<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード設定</title>
    <style>
        .container { padding: 20px; }
        .alert-success { color: green; }
        .alert-danger { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h2>初回パスワード設定</h2>
        <p>ユーザー名を入力し、新しいパスワードを設定してください。</p>
        
        <form th:action="@{/user/setup-password}" method="post">
            <div>
                <label>ユーザー名：</label>
                <input type="text" name="name" required>
            </div>
            <br>
            <div>
                <label>新しいパスワード：</label>
                <input type="password" name="password" required>
            </div>
            <br>
            <button type="submit">保存する</button>
        </form>

        <hr>
        <div th:if="${message}" class="alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>
        <br>
        <a th:href="@{/login}">ログイン画面へ</a>
    </div>
</body>
</html>
